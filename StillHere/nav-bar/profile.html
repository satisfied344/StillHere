<main id="content">
  <section class="profile" aria-labelledby="profile-title">
    <h1 id="profile-title">Profile</h1>

    <article class="profile-card">
      <div class="profile-header">
        <img
          class="avatar"
          src="default-avatar.png"
          alt="User avatar"
          width="120"
          height="120"
        />
      </div>

      <dl class="profile-info">
        <div>
          <dt>How others see you</dt>
          <dd id="display-name">
            Someone here
          </dd>
        </div>

        <div>
          <dt>Username</dt>
          <dd id="username">
            @anonymous
          </dd>
        </div>
      </dl>

      <div class="profile-actions">
        <a href="../edit-profile.html" class="button">
          Edit profile
        </a>
      </div>
    </article>
  </section>
</main>

<footer class="footer">
  <p>StillHere — a project about presence, not solutions.</p>
</footer>
