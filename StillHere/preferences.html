  <style>
    body { padding-top: 73px; }

    .pref-wrap {
      position: relative;
      z-index: 2;
      max-width: 700px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Page header ── */
    .pref-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .pref-title {
      font-size: 44px;
      font-weight: 700;
      color: var(--charcoal);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .pref-subtitle {
      font-size: 16px;
      color: var(--text-mid);
      margin-bottom: 52px;
      line-height: 1.6;
    }

    /* ── Section ── */
    .pref-section {
      margin-bottom: 48px;
    }

    .pref-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-light);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    /* ── Theme cards ── */
    .theme-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .theme-card {
      position: relative;
      border-radius: 18px;
      border: 2px solid var(--border-subtle);
      background: var(--surface-card);
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.18s ease;
      overflow: hidden;
      user-select: none;
    }

    .theme-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.10);
    }

    .theme-card.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(166, 145, 194, 0.20);
    }

    .theme-card-check {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-input);
      transition: background 0.18s, border-color 0.18s;
    }

    .theme-card.is-active .theme-card-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .theme-card-check svg {
      display: none;
    }

    .theme-card.is-active .theme-card-check svg {
      display: block;
    }

    /* Mini preview */
    .theme-preview {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      height: 100px;
      position: relative;
    }

    .theme-preview--light {
      background: linear-gradient(135deg, #edcfb6, #e7c5b9, #ded3f1, #e6cfbb);
    }

    .theme-preview--dark {
      background: linear-gradient(135deg, #1d1520, #1a1828, #201a2c, #1d1820);
    }

    .theme-preview-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 5px;
    }

    .theme-preview--light .theme-preview-bar {
      background: rgba(255,255,255,0.70);
      border-bottom: 1px solid rgba(255,255,255,0.5);
    }

    .theme-preview--dark .theme-preview-bar {
      background: rgba(20,17,30,0.90);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .theme-preview-dot {
      width: 28px;
      height: 6px;
      border-radius: 99px;
    }

    .theme-preview--light .theme-preview-dot { background: rgba(0,0,0,0.12); }
    .theme-preview--dark  .theme-preview-dot { background: rgba(255,255,255,0.15); }

    .theme-preview-card {
      position: absolute;
      bottom: 8px; left: 10px; right: 10px;
      height: 36px;
      border-radius: 8px;
    }

    .theme-preview--light .theme-preview-card {
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(255,255,255,0.9);
    }

    .theme-preview--dark .theme-preview-card {
      background: rgba(30,27,44,0.90);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .theme-card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--charcoal);
      margin-bottom: 3px;
    }

    .theme-card-desc {
      font-size: 13px;
      color: var(--text-mid);
    }

    /* ── Back button ── */
    .pref-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--charcoal);
      background: var(--surface-widget);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 11px 24px;
      margin-top: 12px;
      transition: background 0.18s, transform 0.18s;
      text-decoration: none;
    }

    .pref-back:hover {
      background: var(--surface-card);
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .theme-options { grid-template-columns: 1fr; }
      .pref-title { font-size: 32px; }
    }
  </style>
</head>

  <script>
    /* ── Nav menu toggle ── */
    (function () {
      document.querySelectorAll('.main-menu-dropdown').forEach(function (wrap) {
        var btn   = wrap.querySelector('.main-menu-trigger');
        var panel = wrap.querySelector('.main-menu-panel');
        if (!btn || !panel) return;
        btn.setAttribute('aria-haspopup', 'true');
        btn.setAttribute('aria-expanded', 'false');
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          var open = panel.classList.toggle('is-open');
          btn.setAttribute('aria-expanded', String(open));
        });
        panel.addEventListener('click', function (e) { e.stopPropagation(); });
      });
      document.addEventListener('click', function () {
        document.querySelectorAll('.main-menu-panel.is-open').forEach(function (p) {
          p.classList.remove('is-open');
          var b = p.closest('.main-menu-dropdown').querySelector('.main-menu-trigger');
          if (b) b.setAttribute('aria-expanded', 'false');
        });
      });
    })();

    /* ── Session: swap Login → Sign out ── */
    window.SH_SESSION.whenReady(function (user) {
      var loginItem = document.querySelector('.mmenu-item--login');
      if (!loginItem || !user) return;
      loginItem.innerHTML =
        '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true">' +
        '<path d="M112,216a8,8,0,0,1-8,8H48a16,16,0,0,1-16-16V48A16,16,0,0,1,48,32h56a8,8,0,0,1,0,16H48V208h56A8,8,0,0,1,112,216Z' +
        'M218.83,130.83l-40,40a8,8,0,0,1-11.32-11.32L192.69,136H104a8,8,0,0,1,0-16h88.69L167.51,96.49a8,8,0,1,1,11.32-11.32l40,40A8,8,0,0,1,218.83,130.83Z"/></svg>' +
        'Sign out';
      loginItem.removeAttribute('href');
      loginItem.style.cursor = 'pointer';
      loginItem.addEventListener('click', async function (e) {
        e.preventDefault();
        await window.SH_SESSION.signOut();
        window.location.href = 'login.html';
      });
    });

    /* ── Theme card logic ── */
    (function () {
      var cards = document.querySelectorAll('.theme-card');

      function applyActive(val) {
        cards.forEach(function (c) {
          var isActive = c.dataset.themeVal === val;
          c.classList.toggle('is-active', isActive);
          c.setAttribute('aria-checked', String(isActive));
        });
      }

      /* Set initial state */
      applyActive(window.SH_THEME.get());

      cards.forEach(function (card) {
        function activate() {
          var val = card.dataset.themeVal;
          window.SH_THEME.set(val);
          applyActive(val);
        }
        card.addEventListener('click', activate);
        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); }
        });
      });
    })();
  </script>
