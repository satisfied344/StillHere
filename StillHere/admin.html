    body { overflow-x: hidden; }

    .adm-page {
      max-width: 1200px;

    .adm-hero {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 22px;
      border-bottom: 1px dashed var(--line-soft);

    .adm-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--ink-light);
      margin-bottom: 12px; display: inline-block;
    }
    .adm-eyebrow em { color: var(--accent-2); font-style: normal; margin-right: 4px; }
    .adm-title {
      font-family: "Caveat", cursive;
      font-size: 64px; font-weight: 700; color: var(--ink);
      line-height: 0.96; margin: 0 0 8px;
    }
    .adm-title em { color: var(--accent-2); font-style: italic; }
    .adm-lede {
      font-size: 15px; color: var(--ink-mid); line-height: 1.6; max-width: 540px;
    }
    .adm-stats {
      background: #fffbf2; border: 1.5px solid var(--line); border-radius: 12px;
      padding: 14px 18px; display: flex; gap: 18px; min-width: 240px;
    }
    .adm-stat-num {
      font-family: "Caveat", cursive; font-size: 28px; font-weight: 700;
      color: var(--accent-2); line-height: 1;
    }
    .adm-stat-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-light);
    }

    /* ── Tabs ── */
    .adm-tabs {
      display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .adm-tab {
      padding: 8px 16px; border-radius: 999px; cursor: pointer;
      background: #fffbf2; border: 1.5px solid var(--line);
      font-family: "Ubuntu", sans-serif; font-size: 13px;
      font-weight: 600; color: var(--ink); user-select: none;
      transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .adm-tab:hover {
      border-color: var(--accent-2);
      color: var(--accent-2);
      transform: translateY(-1px);
    }
    .adm-tab.is-active {
      background: var(--accent-2);
      color: #fff;
      border-color: var(--accent-2);
      box-shadow: 0 3px 10px -3px rgba(214, 83, 60, 0.35);
      transform: translateY(-1px);
    }
    .adm-tab .count {
      display: inline-block; margin-left: 6px; padding: 0 6px;
      border-radius: 999px; background: rgba(214, 83, 60, 0.18);
      color: var(--accent-2); font-size: 11px; font-weight: 700;
    }
    .adm-tab.is-active .count {
      background: rgba(255, 255, 255, 0.22); color: #fff;
    }

      background: #fffbf2; border: 1.5px solid var(--line);
      border-radius: 14px; padding: 18px 22px;
      box-shadow: 0 1px 3px rgba(26, 20, 16, 0.04);
    }
    .adm-card-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .adm-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.10em; text-transform: uppercase;
    }

    .adm-badge--comment { background: rgba(109, 130, 104, 0.14); color: #4d5e4a; }
    .adm-badge--state   { background: rgba(26, 20, 16, 0.08);   color: var(--ink); }
    .adm-state-ai_reviewing  { background: rgba(184, 162, 60, 0.18); color: #8a7a20; }
    .adm-state-shadow        { background: rgba(107, 139, 175, 0.18); color: #4a6b8f; }
    .adm-state-hidden        { background: rgba(214, 83, 60, 0.18); color: #b8462f; }
    .adm-state-pending_manual{ background: rgba(214, 83, 60, 0.10); color: var(--accent-2); }

    .adm-meta {
      margin-left: auto; font-size: 12px; color: var(--ink-light);

    }
    .adm-card-title {

      font-size: 13.5px; color: var(--ink-mid); line-height: 1.55;

    .adm-note {
      font-size: 12px; font-style: italic; color: var(--ink-mid);
      padding: 8px 12px; background: rgba(184, 162, 60, 0.10);
      border-left: 3px solid #b8a23c; border-radius: 0 6px 6px 0;
      margin: 6px 0 10px;
    }

    /* AI verdict callout, shows what the strict-review AI decided */
    .ai-verdict-box {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1.5px solid;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ai-verdict-box--violation {
      background: rgba(214, 83, 60, 0.08);
      border-color: rgba(214, 83, 60, 0.32);
    }
    .ai-verdict-box--borderline {
      background: rgba(184, 162, 60, 0.10);
      border-color: rgba(184, 162, 60, 0.32);
    }
    .ai-verdict-box--clean {
      background: rgba(109, 130, 104, 0.10);
      border-color: rgba(109, 130, 104, 0.32);
    }
    .ai-verdict-box--pending {
      background: rgba(26, 20, 16, 0.04);
      border-color: var(--line);
      border-style: dashed;
    }
    .ai-verdict-head {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .ai-verdict-box--violation  .ai-verdict-head { color: #b8462f; }
    .ai-verdict-box--borderline .ai-verdict-head { color: #8a7a20; }
    .ai-verdict-box--clean      .ai-verdict-head { color: #4d5e4a; }
    .ai-verdict-box--pending    .ai-verdict-head { color: var(--ink-light); }
    .ai-verdict-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .ai-verdict-box--violation  .ai-verdict-dot { background: #b8462f; }
    .ai-verdict-box--borderline .ai-verdict-dot { background: #b8a23c; }
    .ai-verdict-box--clean      .ai-verdict-dot { background: #6d8268; }
    .ai-verdict-box--pending    .ai-verdict-dot {
      background: var(--ink-light);
      animation: aiPulse 1.6s ease-in-out infinite;
    }
    @keyframes aiPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.35); }
    }
    .ai-verdict-reason {
      font-size: 13.5px; color: var(--ink); line-height: 1.5;
      font-style: normal; font-weight: 400;
    }
    .ai-verdict-reason em { color: var(--accent-2); font-style: italic; }
    .ai-verdict-meta {
      font-size: 11.5px; color: var(--ink-light);
      font-style: italic;
    }
    .adm-actions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
    }
    .adm-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: 999px;

    .adm-btn--shadow:hover { background: #6b8baf; color: #fff; border-color: #6b8baf; transform: translateY(-1px); }
    .adm-btn--remove { background: var(--accent-2); color: #fff; border-color: var(--accent-2); }
    .adm-btn--remove:hover { background: #b8462f; border-color: #b8462f; transform: translateY(-1px); }
    .adm-btn--review { background: transparent; color: var(--ink); border-color: var(--line); }

    .adm-btn--ai { background: rgba(184, 162, 60, 0.10); color: #8a7a20; border-color: rgba(184, 162, 60, 0.32); }
    .adm-btn--ai:hover { background: #b8a23c; color: #fff; border-color: #b8a23c; transform: translateY(-1px); }
    .adm-btn--ai:disabled { opacity: 0.6; cursor: progress; }

    .adm-block-wrap { position: relative; display: inline-block; }
    .adm-btn--block {

    .adm-btn--block:hover { background: #7a2828; color: #fff; border-color: #7a2828; transform: translateY(-1px); }

    .adm-block-menu hr {

    .adm-block-menu .label {

      .adm-page { padding: calc(73px + 24px) 18px 50px; }
    }

  <script>
document.addEventListener('DOMContentLoaded', function () {

    (function () {
      if (!window.SH_SUPABASE_URL || !window.supabase) return;
      var db = window.supabase.createClient(window.SH_SUPABASE_URL, window.SH_SUPABASE_KEY);
      var queueEl = document.getElementById('queue');
      var allRows = [];
      var currentFilter = 'all';

      function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function timeAgo(iso) {
        var d = Math.floor((Date.now() - new Date(iso)) / 1000);
        if (d < 60)    return 'just now';
        if (d < 3600)  return Math.floor(d / 60)   + 'm ago';
        if (d < 86400) return Math.floor(d / 3600) + 'h ago';
        return Math.floor(d / 86400) + 'd ago';
      }

      function render() {
        var rows;
        if (currentFilter === 'all') {
          // "All" = items NOT yet acted on by an admin.
          // Once an admin clicks keep/shadow/remove (moderated_by set),
          // or the AI auto-resolved them, they leave the All tab and
          // only appear in their specific state tab.
          rows = allRows.filter(function (r) { return !r.moderated_by; });
        } else {
          rows = allRows.filter(function (r) { return r.moderation_state === currentFilter; });
        }

        if (!rows.length) {
          queueEl.innerHTML = '<p class="adm-empty">nothing to review. the community is quiet today.</p>';
          return;
        }

        queueEl.innerHTML = rows.map(function (r) {
          var stateLabel = (r.moderation_state || '').replace(/_/g, ' ');
          var typeBadge = r.target_type === 'post' ? 'post' : 'comment';
          var titleHtml = r.title ? '<h3 class="adm-card-title">' + escHtml(r.title) + '</h3>' : '';

          /* ── AI verdict box ──────────────────────────────────────
             moderation_note format (set by strict-review edge fn):
                "strict-AI: <verdict> (<category>), <reason>"
             If the note matches that pattern → render a verdict callout.
             Otherwise show "AI hasn't reviewed yet" pending box.
             ─────────────────────────────────────────────────────── */
          var aiBox = '';
          var m = r.moderation_note &&
                  r.moderation_note.match(/^strict-AI:\s*(violation|borderline|clean)\s*\(([^)]+)\)\s*[—-]\s*(.*)$/i);
          if (m) {
            var verdict  = m[1].toLowerCase();
            var category = m[2].trim();
            var reason   = m[3].trim();
            var label = verdict === 'violation'  ? 'AI says: violation, auto-removed'
                      : verdict === 'borderline' ? 'AI says: borderline, downranked'
                                                 : 'AI says: clean, sent to manual review';
            aiBox =
              '<div class="ai-verdict-box ai-verdict-box--' + verdict + '">' +
                '<div class="ai-verdict-head">' +
                  '<span class="ai-verdict-dot"></span>' + label +
                  ' <span style="opacity:0.7;letter-spacing:0.08em;">· ' + escHtml(category) + '</span>' +
                '</div>' +
                '<div class="ai-verdict-reason">' + escHtml(reason) + '</div>' +
                '<div class="ai-verdict-meta">strict-AI · review complete</div>' +
              '</div>';
          } else if (r.moderation_state === 'ai_reviewing') {
            aiBox =
              '<div class="ai-verdict-box ai-verdict-box--pending">' +
                '<div class="ai-verdict-head">' +
                  '<span class="ai-verdict-dot"></span>AI review pending' +
                '</div>' +
                '<div class="ai-verdict-meta">waiting for strict-review to run, click "↻ rerun AI" below to trigger it now.</div>' +
              '</div>';
          } else if (r.moderation_note) {
            /* fallback for legacy notes that don't match the pattern */
            aiBox = '<p class="adm-note">⚙ ' + escHtml(r.moderation_note) + '</p>';
          }
          var noteHtml = aiBox;
          return (
            '<article class="adm-card" data-target-type="' + r.target_type + '" data-target-id="' + escHtml(r.target_id) + '">' +
              '<div class="adm-card-head">' +
                '<span class="adm-badge adm-badge--' + r.target_type + '">' + typeBadge + '</span>' +
                '<span class="adm-badge adm-badge--state adm-state-' + r.moderation_state + '">' + stateLabel + '</span>' +
                '<span class="adm-meta">' + r.report_count + ' report' + (r.report_count === 1 ? '' : 's') +
                  ' · weight ' + (r.report_weight || 0) +
                  ' · ' + timeAgo(r.created_at) +
                '</span>' +
              '</div>' +
              titleHtml +
              '<div class="adm-card-content">' + (r.content || '') + '</div>' +
              noteHtml +
              '<div class="adm-actions">' +
                '<button class="adm-btn adm-btn--keep"   data-action="keep">keep</button>' +
                '<button class="adm-btn adm-btn--shadow" data-action="shadow">shadow (downrank)</button>' +
                '<button class="adm-btn adm-btn--remove" data-action="remove">remove</button>' +
                '<span class="adm-block-wrap">' +
                  '<button class="adm-btn adm-btn--block" data-action="block-toggle">🚫 block author</button>' +
                  '<div class="adm-block-menu">' +
                    '<div class="label">Block this author for</div>' +
                    '<button data-action="block" data-seconds="3600">1 hour</button>' +
                    '<button data-action="block" data-seconds="10800">3 hours</button>' +
                    '<button data-action="block" data-seconds="86400">24 hours</button>' +
                    '<button data-action="block" data-seconds="604800">1 week</button>' +
                  '</div>' +
                '</span>' +
                '<button class="adm-btn adm-btn--ai"     data-action="ai-rerun">↻ rerun AI</button>' +
                (r.target_type === 'post'
                  ? '<a class="adm-btn adm-btn--review" href="post?id=' + escHtml(r.target_id) + '" target="_blank" rel="noopener noreferrer">open</a>'
                  : '') +
              '</div>' +
            '</article>'
          );
        }).join('');
      }

      function updateCounts() {
        // "all" count = pending (not yet acted on)
        var counts = {
          all:            allRows.filter(function (r) { return !r.moderated_by; }).length,
          pending_manual: 0,
          hidden:         0,
          shadow:         0,
          ai_reviewing:   0
        };
        allRows.forEach(function (r) {
          if (counts[r.moderation_state] !== undefined) counts[r.moderation_state]++;
        });
        Object.keys(counts).forEach(function (k) {
          var el = document.getElementById('cnt-' + k);
          if (el) el.textContent = counts[k];
        });
        document.getElementById('stat-total').textContent  = allRows.length;
        document.getElementById('stat-urgent').textContent = counts.hidden;
      }

      async function load() {
        // 1. Check admin status
        var { data: { user } } = await db.auth.getUser();
        if (!user) {
          queueEl.innerHTML = '<p class="adm-forbidden">please sign in to access the admin queue.</p>';
          return;
        }
        var { data: roleRow } = await db.from('admin_roles').select('role').eq('user_id', user.id).maybeSingle();
        if (!roleRow) {
          queueEl.innerHTML = '<p class="adm-forbidden">forbidden, your account is not an admin. ask a super_admin to grant access.</p>';
          return;
        }

        // 2. Fetch queue
        var { data, error } = await db.rpc('admin_queue_list');
        if (error) {
          queueEl.innerHTML = '<p class="adm-forbidden">error: ' + escHtml(error.message) + '</p>';
          return;
        }
        allRows = (data || []).sort(function (a, b) {
          // most-reported first, then most-recent
          if ((b.report_weight || 0) !== (a.report_weight || 0)) return (b.report_weight || 0) - (a.report_weight || 0);
          return new Date(b.created_at) - new Date(a.created_at);
        });
        updateCounts();
        render();
      }

      // ── Tab clicks
      document.getElementById('tabs').addEventListener('click', function (e) {
        var tab = e.target.closest('.adm-tab');
        if (!tab) return;
        document.querySelectorAll('.adm-tab').forEach(function (t) { t.classList.remove('is-active'); });
        tab.classList.add('is-active');
        currentFilter = tab.dataset.filter;
        render();
      });

      // ── Decision clicks (delegated)
      queueEl.addEventListener('click', async function (e) {
        var btn = e.target.closest('[data-action]');
        if (!btn) return;
        var card = btn.closest('.adm-card');
        if (!card) return;
        var action = btn.dataset.action;
        var t = card.dataset.targetType, id = card.dataset.targetId;

        // ── "Rerun AI" branch, uses supabase client's functions.invoke
        //    which handles CORS + auth headers automatically.
        if (action === 'ai-rerun') {
          btn.disabled = true;
          btn.textContent = '↻ running…';
          try {
            var inv = await db.functions.invoke('strict-review', {
              body: { target_type: t, target_id: id }
            });
            console.log('[admin] strict-review response:', inv);

            if (inv.error) {
              // Try to read the response body for a friendlier message
              var ctx = inv.error.context;
              var bodyTxt = '';
              if (ctx && typeof ctx.text === 'function') {
                try { bodyTxt = await ctx.text(); } catch (_) {}
              }
              alert('strict-review failed: ' + (inv.error.message || 'unknown')
                    + (bodyTxt ? '\n\n' + bodyTxt.slice(0, 400) : ''));
              btn.disabled = false;
              btn.textContent = '↻ rerun AI';
              return;
            }
            if (inv.data && inv.data.ok === false) {
              alert('strict-review failed: ' + (inv.data.error || 'see console'));
              btn.disabled = false;
              btn.textContent = '↻ rerun AI';
              return;
            }
            await load();
          } catch (ex) {
            console.error('[admin] rerun AI exception:', ex);
            alert('rerun failed: ' + ex.message);
            btn.disabled = false;
            btn.textContent = '↻ rerun AI';
          }
          return;
        }

        // ── Block dropdown: toggle the menu open/closed
        if (action === 'block-toggle') {
          var wrap = btn.closest('.adm-block-wrap');
          var menu = wrap && wrap.querySelector('.adm-block-menu');
          // Close any other open menus first
          document.querySelectorAll('.adm-block-menu.is-open').forEach(function (m) {
            if (m !== menu) m.classList.remove('is-open');
          });
          if (menu) menu.classList.toggle('is-open');
          return;
        }

        // ── Block: actually call the RPC
        if (action === 'block') {
          var seconds = parseInt(btn.dataset.seconds, 10);
          var label   = btn.textContent.trim();
          if (!confirm('Block this author for ' + label + '?\n\nThis blocks the account, device fingerprint, and IP. Anonymous authors can bypass by clearing browser data or switching network.')) return;

          btn.disabled = true;
          console.log('[admin] block_author RPC →', { t, id, seconds });
          var blockRes = await db.rpc('admin_block_author', {
            p_target_type: t,
            p_target_id:   id,
            p_seconds:     seconds,
            p_reason:      null
          });
          btn.disabled = false;
          console.log('[admin] block_author RPC ←', blockRes);

          // Close the menu either way
          var openMenu = btn.closest('.adm-block-menu');
          if (openMenu) openMenu.classList.remove('is-open');

          if (blockRes.error) {
            var msg = blockRes.error.message || '';
            if (msg.indexOf('no identifiers') !== -1) {
              alert('Cannot block, this post was created before the block feature existed, so we have no fingerprint or IP for the author. New posts will work.');
            } else if (msg.indexOf('forbidden') !== -1) {
              alert('Forbidden, your account is not flagged as admin.');
            } else {
              alert('block failed: ' + msg + '\n\n(see browser console for details)');
            }
            return;
          }
          alert('Author blocked for ' + label + '.\n\nDetails: ' + JSON.stringify(blockRes.data, null, 2));
          return;
        }

        if (!confirm('Apply "' + action + '" to this ' + t + '?')) return;

        btn.disabled = true;
        var { data, error } = await db.rpc('admin_decide', {
          p_target_type: t,
          p_target_id:   id,
          p_decision:    action,
          p_note:        null
        });
        if (error) {
          alert('error: ' + error.message);
          btn.disabled = false;
          return;
        }

        // Refetch from server so:
        //   • shadow → row moves from "All" / "AI reviewing" to the Shadow tab
        //   • keep   → row disappears (state=active, report aggregates cleared)
        //   • remove → row disappears (hard-deleted server-side by migration 005)
        await load();
      });

      // Close block menus when clicking outside
      document.addEventListener('click', function (e) {
        if (e.target.closest('.adm-block-wrap')) return;
        document.querySelectorAll('.adm-block-menu.is-open').forEach(function (m) {
          m.classList.remove('is-open');
        });
      });

      load();
    })();
  
});
</script>
</body>
</html>
