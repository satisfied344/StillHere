<main class="main-feed">

    <section class="feed">
        <div class="filters">
            <div class="pill-group" aria-label="Language filter">
                <button class="pill" type="button">EN</button>
                <button class="pill" type="button">RU</button>  
            </div>

            <div class="pill-group" aria-label="Category filter">
                <button class="pill" type="button">Need support</button>
                <button class="pill" type="button">No advices</button>  
            </div>
        </div>

        <div class="search-row">
            <input
                id="searchInput"
                class="search-input"
                type="search"
                placeholder="Search by topic (anxiety, burnout, relationships...)"
                aria-label="Search posts"
                />
            <button id="searchClear" class="search-btn" type="button">Clear</button>
            <button id="search" class="search-btn" type="button">Search</button>
        </div>

        <article class="post-card">
            <header class="post-header">
                <h2>
                    <a href="post-1.html">I don't know how to keep going</a>
                </h2>

                <div class="post-menu">
                    <button
                        class="post-menu-button"
                        aria-label="Post options"
                        aria-haspopup="menu"
                        >
                        ...
                    </button>

                    <ul class="post-menu" role="menu">
                        <li role="menuitem">
                            <button type="button">Report</button>
                        </li>

                        <li role="menuitem">
                            <button type="button">Copy link</button>
                        </li>

                        <li role="menuitem">
                            <button type="button" disabled>Delete</button>
                        </li>
                    </ul>
                </div>

            </header>
            <p class="meta">EN · Anxiety · No advice</p>
            <p class="preview">Just need to say it somewhere. Everything feels heavy…</p>

        </article>

        <article class="post-card">
            <header class="post-header">
                <h2>
                    <a href="post-2.html">Мне сложно просить о помощи</a>
                </h2>
            
                <div class="post-menu">
                    <button
                        class="post-menu-button"
                        aria-label="Post options"
                        aria-haspopup="menu"
                        >
                        ...
                    </button>

                    <ul class="post-menu" role="menu">
                        <li role="menuitem">
                            <button type="button">Report</button>
                        </li>

                        <li role="menuitem">
                            <button type="button">Copy link</button>
                        </li>

                        <li role="menuitem">
                            <button type="button" disabled>Delete</button>
                        </li>
                    </ul>
                </div>
            </header>
            <p class="meta">RU · Self-esteem · Need support</p>
            <p class="preview">Я обычно молчу, но сейчас не получается…</p>
        </article>
    </section>

    <section class="create-post">
        <a href="create-post.html" class="button create_post_button">
            Create post
        </a>
</main>
