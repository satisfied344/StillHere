<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StillHere</title>
    <link rel="stylesheet" href="register-screen.css">
</head>
<body>
    <nav class="top-info" aria-label="Primary navigation">
        <a href="nav-bar/about.html" class="nav-link">about</a>

        <a href="nav-bar/contacts.html" class="nav-link">contacts</a>

        <a href="nav-bar/updates.html" class="nav-link">updates</a>
    </nav>

    <div class="register">
        <h1 class="page">Sign up for StillHere</h1>
        <form action="#" method="post" class="form-example">
            <div class="display_name">
                <label for="display_name">Enter your nickname: </label>
                <input type="text" name="display_name" id="display_name" required autocomplete="given-name" placeholder="your name">
                <input type="text" name="display_last_name" id="display_last_name" autocomplete="family-name" placeholder="your last name (optional)">
            </div>
            
            <div class="username">
                <label for="username">Enter your username: </label>
                <input type="text" name="username" id="username" required autocomplete="username" placeholder="your username">
            </div>

            <div>
                <label for="password">Enter your password: </label>
                <input type="password" name="password" id="password" required autocomplete="new-password" placeholder="password">
            </div>
            
            <p class="login-text">
                already have an account? <a href="login.html" class="login-link">Sign in</a>
            </p>


            <button type="submit">Sign up</button>
        </form>
    </div>

<footer class="footer">
  <p>StillHere — a project about presence, not solutions.</p>
</footer>

</body>
</html>
