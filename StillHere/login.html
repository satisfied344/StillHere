<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StillHere</title>
    <link rel="stylesheet" href="register-screen.css">
</head>
<body>
    <div class="nav-bar">
        <nav class="top-info">
            <a href="about.html" class="nav-link">about</a>

            <a href="contacts.html" class="nav-link">contacts</a>

            <a href="updates.html" class="nav-link">updates</a>
        </nav>
    </div>

    <div class="login">
        <form action="#" method="post" class="form-example">
            <div class="username">
                <label for="username">Enter your username: </label>
                <input type="text" name="username" id="username" required autocomplete="username" placeholder="your username" autofocus>
            </div>

            <div>
                <label for="password">Enter your password: </label>
                <input type="password" name="password" id="password" required autocomplete="current-password" placeholder="password">
            </div>
            
            <p>
                <a href="register.html" class="register-link">Don`t have an account? Sign up</a>
            </p>

            <button type="submit">log in</button>
        </form>
    </div>

</body>
</html>
